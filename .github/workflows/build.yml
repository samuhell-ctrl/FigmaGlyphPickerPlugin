name: Build and Release (Mac & Windows)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  # ==========================================
  # 🖥️ WINDOWS ROBOT
  # ==========================================
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 1. Download Your Code
        uses: actions/checkout@v4

      - name: 2. Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Install Server Dependencies
        working-directory: ./figma-glyph-server
        run: npm install

      - name: 4. Build the .exe
        working-directory: ./figma-glyph-server
        run: npm run dist

      - name: 5. Package the Windows ZIP File
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging\FigmaGlyphPicker_Windows
          Copy-Item -Path figma-glyph-plugin -Destination staging\FigmaGlyphPicker_Windows\figma-glyph-plugin -Recurse
          Copy-Item -Path "figma-glyph-server\dist\*.exe" -Destination staging\FigmaGlyphPicker_Windows\
          Compress-Archive -Path staging\FigmaGlyphPicker_Windows -DestinationPath FigmaGlyphPicker_Windows_${{ github.event.inputs.version }}.zip

      - name: 6. Publish Windows to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          files: FigmaGlyphPicker_Windows_${{ github.event.inputs.version }}.zip
          draft: false
          prerelease: false

  # ==========================================
  # 🍎 MAC ROBOT
  # ==========================================
  build-mac:
    runs-on: macos-latest
    steps:
      - name: 1. Download Your Code
        uses: actions/checkout@v4

      - name: 2. Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Install Server Dependencies
        working-directory: ./figma-glyph-server
        run: npm install

      - name: 4. Build the .dmg
        working-directory: ./figma-glyph-server
        run: npm run dist

      - name: 5. Package the Mac ZIP File
        run: |
          mkdir -p staging/FigmaGlyphPicker_Mac
          cp -r figma-glyph-plugin staging/FigmaGlyphPicker_Mac/
          cp figma-glyph-server/dist/*.dmg staging/FigmaGlyphPicker_Mac/
          cd staging
          zip -r ../FigmaGlyphPicker_Mac_${{ github.event.inputs.version }}.zip FigmaGlyphPicker_Mac

      - name: 6. Publish Mac to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          files: FigmaGlyphPicker_Mac_${{ github.event.inputs.version }}.zip
          draft: false
          prerelease: false