name: Build and Release (Mac & Windows)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version (e.g., v1.0.1)'
        required: true
        default: 'v1.0.1'

permissions:
  contents: write

env:
  APP_VERSION: ${{ inputs.version || github.ref_name }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: 1. Download Your Code
        uses: actions/checkout@v4

      - name: 2. Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 3. Install Server Dependencies
        working-directory: ./figma-glyph-server
        run: npm install

      - name: 4. Build the .exe
        working-directory: ./figma-glyph-server
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: 5. Package Main Windows Bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging\FigmaGlyphPicker_Windows
          Copy-Item -Path figma-glyph-plugin -Destination staging\FigmaGlyphPicker_Windows\figma-glyph-plugin -Recurse
          Copy-Item -Path "figma-glyph-server\dist\*.exe" -Destination staging\FigmaGlyphPicker_Windows\
          # Named with 00_ to force it to the top of the GitHub Assets list
          Compress-Archive -Path staging\FigmaGlyphPicker_Windows -DestinationPath 00_DOWNLOAD_Windows_Bundle_${{ env.APP_VERSION }}.zip

      - name: 6. Publish Windows to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.APP_VERSION }}
          name: Release ${{ env.APP_VERSION }}
          files: |
            00_DOWNLOAD_Windows_Bundle_${{ env.APP_VERSION }}.zip
            figma-glyph-server/dist/*.exe
            figma-glyph-server/dist/*.yml
          draft: false
          prerelease: false

  build-mac:
    runs-on: macos-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: 1. Download Your Code
        uses: actions/checkout@v4

      - name: 2. Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 3. Install Server Dependencies
        working-directory: ./figma-glyph-server
        run: npm install

      - name: 4. Build the .dmg and .zip
        working-directory: ./figma-glyph-server
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: 5. Package Main Mac Bundle
        run: |
          mkdir -p staging/FigmaGlyphPicker_Mac
          cp -r figma-glyph-plugin staging/FigmaGlyphPicker_Mac/
          cp figma-glyph-server/dist/*.dmg staging/FigmaGlyphPicker_Mac/
          cd staging
          # Named with 00_ to force it to the top of the GitHub Assets list
          zip -r ../00_DOWNLOAD_Mac_Bundle_${{ env.APP_VERSION }}.zip FigmaGlyphPicker_Mac

      - name: 6. Publish Mac to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.APP_VERSION }}
          name: Release ${{ env.APP_VERSION }}
          files: |
            00_DOWNLOAD_Mac_Bundle_${{ env.APP_VERSION }}.zip
            figma-glyph-server/dist/*.dmg
            figma-glyph-server/dist/*.zip
            figma-glyph-server/dist/*.yml
          draft: false
          prerelease: false